<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Admin | Folks Team</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=folks-official-1" />
    <link rel="icon" type="image/png" href="/favicon.png?v=folks-official-1" />
    <link rel="shortcut icon" href="/favicon.png?v=folks-official-1" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=folks-official-1" />
    <meta name="theme-color" content="#4fb16f" />
    <link rel="stylesheet" href="/admin/admin-ui.css?v=folks-admin-1" />
    <style>
      .shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 18px 16px 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 12px;
        margin-bottom: 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand h1 {
        margin: 0;
        font-size: 24px !important;
      }

      .eyebrow {
        margin: 0 0 2px;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
      }

      .main-actions {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .action-card {
        min-height: 96px;
        display: grid;
        align-content: space-between;
        gap: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 14px;
        box-shadow: var(--shadow);
      }

      .action-card strong {
        font-size: 18px;
      }

      .action-card span:not(.button) {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .action-card.primary {
        border-color: #bde8cb;
        background: var(--brand-soft);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        gap: 14px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 14px;
        box-shadow: var(--shadow);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 20px;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .todo-item,
      .notification,
      .search-result {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fafafa;
        padding: 11px 12px;
      }

      .todo-item > div,
      .search-result > div {
        min-width: 0;
      }

      .todo-item strong,
      .search-result strong {
        display: block;
        font-size: 14px;
      }

      .todo-item p,
      .search-result p {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .urgent {
        border-color: #fecaca;
        background: #fff7f7;
      }

      .warn {
        border-color: #fde68a;
        background: #fffbeb;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .metric-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fafafa;
        padding: 12px;
      }

      .metric-card span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .metric-card strong {
        display: block;
        margin-top: 7px;
        font-size: 28px;
        line-height: 1;
      }

      .status-line {
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .search-panel input {
        width: 100%;
        margin-bottom: 10px;
        border: 1px solid #d4d4d4;
        border-radius: 8px;
        padding: 12px;
        font: inherit;
      }

      @media (max-width: 860px) {
        .main-actions,
        .workspace {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .nav {
          width: 100%;
        }
      }
    </style>
  </head>
  <body class="admin-page admin-home">
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img class="mark" src="/folks-brand-mark.jpg" alt="Folks Team logo" />
          <div>
            <p class="eyebrow">Folks Team</p>
            <h1>Admin</h1>
          </div>
        </div>
        <nav class="nav" aria-label="Admin">
          <a href="/">Website</a>
          <a class="secondary" href="/admin/operations.html">Vận hành</a>
          <a class="secondary" href="/admin/console.html">Kỹ thuật</a>
          <button type="button" class="button secondary" data-admin-logout>
            Đăng xuất
          </button>
        </nav>
      </header>

      <section class="main-actions" aria-label="Thao tác chính">
        <a class="action-card primary" href="/admin/leads.html">
          <strong>Lead</strong>
          <span id="lead-action-status">Đang tải</span>
        </a>
        <a class="action-card primary" href="/admin/content.html">
          <strong>Sửa website</strong>
          <span>Live editor</span>
        </a>
        <a class="action-card" href="/admin/blog.html">
          <strong>Blog</strong>
          <span id="blog-action-status">Draft / review</span>
        </a>
        <a class="action-card" href="/admin/text.html">
          <strong>Sửa chữ</strong>
          <span>Bulk edit</span>
        </a>
      </section>

      <section class="workspace" aria-label="Tổng quan">
        <section class="panel">
          <div class="panel-head">
            <h2>Cần xử lý</h2>
            <button type="button" class="button secondary" id="refresh-dashboard">
              Làm mới
            </button>
          </div>
          <div class="stack" id="notification-list"></div>
          <div class="stack" id="daily-todos"></div>
        </section>

        <div class="stack">
          <section class="panel" aria-label="Số liệu">
            <div class="panel-head">
              <h2>Số liệu</h2>
            </div>
            <div class="status-line" id="dashboard-status">Đang tải số liệu...</div>
            <div class="metric-grid" id="dashboard-metrics"></div>
          </section>

          <section class="panel search-panel" aria-label="Tìm nhanh">
            <div class="panel-head">
              <h2>Tìm nhanh</h2>
            </div>
            <input id="global-search" placeholder="lead, blog, ảnh, SEO..." />
            <div class="stack" id="global-search-results"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="/admin/admin-session.js"></script>
    <script>
      const dashboardStatus = document.getElementById('dashboard-status');
      const dashboardMetrics = document.getElementById('dashboard-metrics');
      const notificationList = document.getElementById('notification-list');
      const dailyTodos = document.getElementById('daily-todos');
      const globalSearch = document.getElementById('global-search');
      const globalSearchResults = document.getElementById('global-search-results');
      const leadActionStatus = document.getElementById('lead-action-status');
      const blogActionStatus = document.getElementById('blog-action-status');

      const adminSearchItems = [
        ['Lead', 'lead khach contact email tag', '/admin/leads.html'],
        ['Sửa website', 'content cms sua trang anh preview publish', '/admin/content.html'],
        ['Blog', 'blog draft review seo image publish', '/admin/blog.html'],
        ['Sửa chữ', 'text bulk search replace', '/admin/text.html'],
        ['Duyệt', 'review approve queue', '/admin/operations.html#review'],
        ['SEO', 'seo title description alt', '/admin/operations.html#seo'],
        ['Ảnh', 'image media upload url', '/admin/operations.html#media'],
        ['Audit', 'audit history restore', '/admin/operations.html#audit'],
        ['Kỹ thuật', 'console config deploy security', '/admin/console.html'],
      ];

      function escapeHtml(value) {
        return String(value || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function compactDate(value) {
        if (!value) return '-';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString('vi-VN', {
          dateStyle: 'short',
          timeStyle: 'short',
        });
      }

      function metricCard(label, value) {
        return `<article class="metric-card"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value ?? 0)}</strong></article>`;
      }

      function todoItem(title, note, href, type = '') {
        return `
          <article class="todo-item ${type}">
            <div>
              <strong>${escapeHtml(title)}</strong>
              <p>${escapeHtml(note)}</p>
            </div>
            <a class="button secondary" href="${escapeHtml(href)}">Mở</a>
          </article>
        `;
      }

      function renderGlobalSearch() {
        const keyword = globalSearch.value.trim().toLowerCase();
        const items = adminSearchItems
          .filter(item => !keyword || `${item[0]} ${item[1]}`.toLowerCase().includes(keyword))
          .slice(0, 6);

        globalSearchResults.innerHTML = items
          .map(
            item =>
              `<a class="search-result" href="${escapeHtml(item[2])}"><div><strong>${escapeHtml(item[0])}</strong><p>${escapeHtml(item[1])}</p></div></a>`
          )
          .join('');
      }

      function renderNotifications(metrics = {}) {
        const items = [
          metrics.staleNewLeads
            ? ['urgent', `${metrics.staleNewLeads} lead quá 24h`, '/admin/leads.html']
            : null,
          metrics.newLeads
            ? ['warn', `${metrics.newLeads} lead mới`, '/admin/leads.html']
            : null,
          metrics.pendingReviews
            ? ['warn', `${metrics.pendingReviews} mục chờ duyệt`, '/admin/operations.html#review']
            : null,
        ].filter(Boolean);

        notificationList.innerHTML = items.length
          ? items
              .map(
                item =>
                  `<a class="notification ${item[0]}" href="${escapeHtml(item[2])}">${escapeHtml(item[1])}</a>`
              )
              .join('')
          : '<div class="notification">Không có cảnh báo</div>';
      }

      function renderTodos(data = {}) {
        const metrics = data.metrics || {};
        const todos = [
          metrics.staleNewLeads
            ? [
                'urgent',
                `Trả lời ${metrics.staleNewLeads} lead quá hạn`,
                'Ưu tiên trước khi publish.',
                '/admin/leads.html',
              ]
            : null,
          metrics.newLeads
            ? [
                'warn',
                `Phân loại ${metrics.newLeads} lead mới`,
                'Gắn trạng thái hoặc người phụ trách.',
                '/admin/leads.html',
              ]
            : null,
          metrics.pendingReviews
            ? [
                'warn',
                `Duyệt ${metrics.pendingReviews} mục`,
                data.latest?.reviewAt ? `Mới nhất: ${compactDate(data.latest.reviewAt)}` : 'Review queue',
                '/admin/operations.html#review',
              ]
            : null,
        ].filter(Boolean);

        dailyTodos.innerHTML = todos.length
          ? todos.map(item => todoItem(item[1], item[2], item[3], item[0])).join('')
          : todoItem('Kiểm tra website', 'Health, SEO, audit.', '/admin/operations.html#health');
      }

      async function loadDashboard() {
        dashboardStatus.textContent = 'Đang tải số liệu...';
        dashboardMetrics.innerHTML = '';
        dailyTodos.innerHTML = '';

        try {
          const response = await fetch('/api/admin-operations?module=dashboard', {
            credentials: 'same-origin',
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok || data.ok === false) {
            throw new Error(data.message || `Không tải được dashboard (${response.status}).`);
          }

          const metrics = data.metrics || {};
          dashboardStatus.textContent = `Cập nhật: ${compactDate(data.updatedAt)}`;
          leadActionStatus.textContent = metrics.newLeads
            ? `${metrics.newLeads} mới`
            : 'Không có lead mới';
          blogActionStatus.textContent = metrics.pendingReviews
            ? `${metrics.pendingReviews} chờ duyệt`
            : 'Draft / review';

          renderNotifications(metrics);
          renderTodos(data);
          dashboardMetrics.innerHTML = [
            metricCard('Lead mới', metrics.newLeads || 0),
            metricCard('Đang xử lý', metrics.workingLeads || 0),
            metricCard('Chờ duyệt', metrics.pendingReviews || 0),
            metricCard('Audit', metrics.auditEvents || 0),
          ].join('');
        } catch (error) {
          dashboardStatus.textContent =
            error instanceof Error ? error.message : 'Không tải được dashboard.';
          leadActionStatus.textContent = 'Mở';
          blogActionStatus.textContent = 'Draft / review';
          notificationList.innerHTML = '<div class="notification urgent">Không tải được dữ liệu.</div>';
          dailyTodos.innerHTML = todoItem(
            'Mở vận hành',
            'Kiểm tra đăng nhập hoặc API.',
            '/admin/operations.html#health',
            'urgent'
          );
          dashboardMetrics.innerHTML = [
            metricCard('Lead mới', '-'),
            metricCard('Đang xử lý', '-'),
            metricCard('Chờ duyệt', '-'),
            metricCard('Audit', '-'),
          ].join('');
        }
      }

      document.getElementById('refresh-dashboard').addEventListener('click', loadDashboard);
      globalSearch.addEventListener('input', renderGlobalSearch);
      renderGlobalSearch();
      loadDashboard();
    </script>
  </body>
</html>
